name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    name: Code Quality, Testing & Security Scan

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linter (flake8)
        run: |
          flake8 .

      - name: Run Unit Tests (pytest)
        run: |
          pytest

      - name: Run Security Scan (bandit)
        run: |
          bandit -r . -s B101,B104  

  docker:
    name: Build & Push Docker Image

    needs: test

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:${{ github.sha }}

  deploy:
    name: Deploy to EC2

    needs: docker

    runs-on: ubuntu-latest

    steps:

      - name: Deploy Application to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            echo "Pull latest Docker image"

            docker pull ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:${{ github.sha }}

            echo "Stop old container"

            docker stop charming_cannon || true

            echo "Remove old container"

            docker rm charming_cannon || true

            echo "Run new container"

            docker run -d \
              --name charming_cannon \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:${{ github.sha }}

            echo "Remove unused Docker images"

            docker image prune -f
